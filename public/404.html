<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>CargoTrack</title>
    <script>
      // GitHub Pages SPA routing trick
      // Bilinmeyen URL'leri index.html'e yönlendirir
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') +
        '/?/' + l.pathname.slice(1) + (l.search ? '&' + l.search.slice(1) : '') + l.hash
      );
    </script>
  </head>
  <body></body>
</html>
